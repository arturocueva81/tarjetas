<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjetas</title>
  <link rel="stylesheet" href="tarjetas.css">
  <script src="tarjetas.js" defer></script>
</head>
<body>

  <div class="top">
    <button class="btn" onclick="crearPintar()">Generar</button>
  </div>

  <div class="inputs">
    <p>Pintar Casillas</p>
    <div>
      <input type="number" id="txtDesde" class="no-spinner" min="1" max="10" placeholder="Desde">
    </div>
    <div>
      <input type="number" id="txtHasta" class="no-spinner" min="1" max="10" placeholder="Hasta">
    </div>
    <div>
      <input type="number" id="txtSalto" class="no-spinner" min="1" max="9" placeholder="Salto">
    </div>

  </div>

  <div class="contenedor" id="divTarjetas">
    
  </div>

</body>
</html>
